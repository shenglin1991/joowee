    # pdf.js worker (évite que Nginx serve index.html si le fichier existe)
    location = /resize/pdf.worker.min.mjs {
        root /var/www/adrien-sheng-lin.fr;
        add_header Content-Type application/javascript;
        try_files $uri =404;
        access_log off;
    }

    # API REST NestJS
    location /api {
