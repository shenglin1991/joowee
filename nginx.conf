# ===================================================================
# BLOC 4 : HTTPS pour le domaine (certificat valide, config complète)
# ===================================================================
server {
    listen 443 ssl;
    server_name adrien-sheng-lin.fr www.adrien-sheng-lin.fr;

    # Certificats SSL Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/adrien-sheng-lin.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/adrien-sheng-lin.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/adrien-sheng-lin.fr/html;
    index index.html;

    # Page d'accueil par défaut
    location / {
        try_files $uri $uri/ =404;
