# ===================================================================
# BLOC 1 : HTTP → HTTPS redirect (pour le domaine uniquement)
# ===================================================================
server {
    listen 80;
    server_name adrien-sheng-lin.fr www.adrien-sheng-lin.fr;
    return 301 https://$host$request_uri;
}

# ===================================================================
# BLOC 2 : HTTP pour l'IP (sans redirect, pour tests)
# ===================================================================
server {
    listen 80;
    server_name 37.187.218.143 localhost;

    root /var/www/adrien-sheng-lin.fr/html;
    index index.html;

    # Page d'accueil par défaut
    location / {
        try_files $uri $uri/ =404;
    }

    # Frontend Angular daily
    location /daily {
        root /var/www/adrien-sheng-lin.fr;
        try_files $uri $uri/ /daily/index.html;
    }

    # Frontend Angular resize
    location /resize {
        root /var/www/adrien-sheng-lin.fr;
        try_files $uri $uri/ /resize/index.html;
    }

    # pdf.js worker (évite que Nginx serve index.html si le fichier existe)
    location = /resize/pdf.worker.min.mjs {
        root /var/www/adrien-sheng-lin.fr;
        add_header Content-Type application/javascript;
        try_files $uri =404;
        access_log off;
    }

    # API REST NestJS
    location /api {
        proxy_pass http://localhost:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket Socket.io
    location /socket.io/ {
        proxy_pass http://localhost:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

